name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        required: true

permissions:
  contents:
    write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - run: |
             sudo apt-get update
             sudo apt-get install -y musl-dev
      - run: sbt dist
        env:
          TOUMI_STATIC_LINK: yes
      - run: gh release create ${{ inputs.tag }} ./dist/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
